services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gke-cost-advisor-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - PROMETHEUS_ENDPOINT=http://localhost:9090
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - GCP_REGION=${GCP_REGION:-us-central1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - gke-cost-advisor-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gke-cost-advisor-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - gke-cost-advisor-network

networks:
  gke-cost-advisor-network:
    driver: bridge